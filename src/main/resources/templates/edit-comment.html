<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Comment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Edit Comment</h1>

<div class="page-center">
    <div class="card">

        <form th:action="@{/comments/update}" method="post">

            <input type="hidden" name="id" th:field="*{comment.id}"/>

            <label>Name</label>
            <input type="text" th:field="*{comment.name}"/>

            <label>Email</label>
            <input type="email" th:field="*{comment.email}"/>

            <label>Comment</label>
            <textarea th:field="*{comment.comment}"></textarea>

            <button type="submit">Update Comment</button>

        </form>

    </div>
</div>

</body>
</html>
