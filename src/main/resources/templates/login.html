<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>Login</h2>

<div th:if="${param.error}">
    Invalid email or password
</div>

<div th:if="${param.logout}">
    Logged out successfully
</div>

<form th:action="@{/login}" method="post">

    <label>Email</label>
    &nbsp;
    <input type="text"
           name="username"
           autocomplete="off"
           required>

    <br><br>

    <label>Password</label>
    &nbsp;
    <input type="password"
           name="password"
           required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a th:href="@{/register}">
    Register
</a>

</body>
</html>
